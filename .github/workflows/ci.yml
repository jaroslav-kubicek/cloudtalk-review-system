name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Verify api-client codegen is up to date
        env:
          DATABASE_URL: postgres://ci@127.0.0.1:5432/ci
        run: |
          pnpm --filter @reviews/api-client codegen
          git diff --exit-code packages/api-client/openapi.json packages/api-client/src/generated
